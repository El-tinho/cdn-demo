services:
  origem:
    build:
      context: ./origem
    ports:
      - "8081:80"
    cap_add:
      - NET_ADMIN
    volumes:
      - ./origem/index.html:/usr/share/nginx/html/index.html
      - ./origem/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./origem/HMNARNH02.mp4:/usr/share/nginx/html/HMNARNH02.mp4
      - ./origem/init.sh:/init.sh
    entrypoint: ["/bin/sh", "/init.sh"]
    networks:
      cdn_network:
        ipv4_address: 172.20.0.10

  cdn:
    image: nginx:alpine
    container_name: cdn
    ports:
      - "8080:80"
    volumes:
      - ./cdn/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./cdn/index.html:/usr/share/nginx/html/index.html
    depends_on:
      - origem
    networks:
      cdn_network:
        ipv4_address: 172.20.0.20

networks:
  cdn_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24