proxy_cache_path /tmp/cdn_cache levels=1:2 keys_zone=cdn_cache:10m max_size=100m inactive=60m use_temp_path=off;

server {
    listen 80;
    server_name cdn.local;

    location / {
        proxy_pass http://origem:80;

        # Configuracao de cache
        proxy_cache cdn_cache;
        proxy_cache_valid 200 10m;
        proxy_cache_use_stale error timeout updating;

        # Headers para identificar HIT ou MISS
        add_header X-Cache $upstream_cache_status;
        add_header X-Servidor "cdn";
        add_header Cache-Control "public, max-age=600";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
